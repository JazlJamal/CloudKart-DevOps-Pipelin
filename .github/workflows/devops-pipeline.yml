name: CloudKart DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Source Code
      uses: actions/checkout@v4

    - name: 2. Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Execute Automated Unit Tests
      run: |
        pytest --verbose

    - name: 5. Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 6. Build Container Image
      run: |
        docker build -t cloudkart-webapp:${{ github.sha }} .

    - name: 7. Validate Container Deployment & Health Check
      run: |
        docker run -d -p 5000:5000 --name cloudkart-container cloudkart-webapp:${{ github.sha }}
        sleep 5
        curl -f http://localhost:5000/health || exit 1
        docker stop cloudkart-container
